name: Build REDUX 1.8 Web
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Web Client
        run: |
          chmod +x gradlew
          # This is the "Magic Word" for this specific workspace
          ./gradlew :target_teavm_javascript:makeOfflineDownload --no-daemon
          
      - name: Upload REDUX Game
        uses: actions/upload-artifact@v4
        with:
          name: REDUX-Playable-Game
          path: |
            javascript/*.html
            target_teavm_javascript/build/teavm/dist/*.html
