name: Build REDUX 1.8 Web
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Web Client
        run: |
          chmod +x gradlew
          # This command tells Gradle to build EVERY sub-project
          ./gradlew assemble --no-daemon
          
          echo "--- DEBUG: SCANNING EVERYTHING FOR THE GAME ---"
          find . -name "index.html"
          find . -name "*.js"
          find . -name "*.wasm"
          
      - name: Upload REDUX Game
        uses: actions/upload-artifact@v4
        with:
          name: REDUX-Playable-Game
          path: |
            **/build/teavm/**
            **/dist/**
            **/javascript/**
            **/*.html
            **/*.js
            **/*.wasm
