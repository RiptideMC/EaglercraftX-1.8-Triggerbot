name: Build REDUX 1.8 Web
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Web Client
        run: |
          chmod +x gradlew
          # Force the specific JavaScript build task
          ./gradlew :target_teavm_javascript:teavmGenerate --no-daemon || ./gradlew build --no-daemon
          
          echo "--- DEBUG: LOCATING THE HTML GAME ---"
          find . -name "index.html"
          find . -name "classes.js"

      - name: Clean Source Folders
        run: |
          # Delete the source folders so they don't end up in the zip
          rm -rf src desktopRuntime target_teavm_javascript target_teavm_wasm_gc
          
      - name: Upload ONLY Playable Game
        uses: actions/upload-artifact@v4
        with:
          name: REDUX-Playable-Game
          path: |
            **/*.html
            **/*.js
            **/*.epk
