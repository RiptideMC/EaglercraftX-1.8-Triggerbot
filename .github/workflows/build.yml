name: Build REDUX 1.8 Web
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Web Client
        run: |
          chmod +x gradlew
          # This command tries every possible "Web" task name until one works
          ./gradlew :target_teavm_javascript:teavm :target_teavm_javascript:makeOfflineDownload --no-daemon || \
          ./gradlew :target_teavm_javascript:build :target_teavm_javascript:makeOfflineDownload --no-daemon || \
          ./gradlew build --no-daemon
          
          echo "--- DEBUG: SEARCHING FOR THE FINISHED HTML ---"
          find . -name "*.html" -size +5M
          
      - name: Upload REDUX Game
        uses: actions/upload-artifact@v4
        with:
          name: REDUX-Playable-Game
          path: |
            javascript/*.html
            target_teavm_javascript/build/teavm/dist/*.html
            **/*.html
