name: Build REDUX 1.8 Web
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Web Client
        run: |
          chmod +x gradlew
          # This command tells Gradle to find the build task itself
          ./gradlew assemble --no-daemon || ./gradlew build --no-daemon
          
          echo "--- DEBUG: LISTING ALL FILES CREATED ---"
          find . -maxdepth 5 -not -path '*/.*'
          
      - name: Upload Everything Found
        uses: actions/upload-artifact@v4
        with:
          name: REDUX-Client
          path: |
            **/*.html
            **/*.js
            **/*.epk
            **/*.zip
