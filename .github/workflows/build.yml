name: Build REDUX 1.8 Web
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Web Client
        run: |
          chmod +x gradlew
          # This command builds the client and the offline download
          ./gradlew :target_teavm_javascript:teavmCompile :target_teavm_javascript:makeOfflineDownload --no-daemon
          
          echo "--- DEBUG: SEARCHING FOR ALL HTML FILES ---"
          find . -name "*.html"
          
      - name: Upload Everything Found
        uses: actions/upload-artifact@v4
        with:
          name: REDUX-Client
          path: |
            **/*.html
            **/*.js
            **/*.epk
