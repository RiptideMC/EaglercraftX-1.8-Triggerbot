name: Build REDUX 1.8 Web
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Web Client
        run: |
          chmod +x gradlew
          # This command FORCES the JavaScript and WASM compilation
          ./gradlew :target_teavm_javascript:build :target_teavm_wasm_gc:build --no-daemon
          
      - name: Upload REDUX Game
        uses: actions/upload-artifact@v4
        with:
          name: REDUX-Playable-Game
          path: |
            target_teavm_javascript/build/teavm/
            target_teavm_wasm_gc/build/teavm/
            javascript/
            dist/
